name: Release VS Code Extension

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch|minor|major) or specific version'
        required: false
        default: 'patch'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Version bump
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.events.inputs.version }}"
          else
            VERSION="patch"
          fi
          npm version $VERSION --no-git-tag-version
          echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Package extension
        run: npx vsce package --no-git-tag-version -o ${{ github.workspace }}/extension.vsix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: extension.vsix

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: extension
          path: .

      - name: Publish to VS Marketplace
        run: npx vsce publish --packagePath extension.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Push version tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "release: v$VERSION" || true
          git tag "v$VERSION"
          git push origin "v$VERSION" --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
